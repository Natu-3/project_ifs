services:
  redis:
    image: redis:7-alpine
    container_name: ifs-redis
    restart: unless-stopped
    ports:
      - "6379:6379"

  db:
    image: mysql:8.0
    container_name: ifs-db
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: ${DB_PASSWORD}
      MYSQL_DATABASE: ${DB_NAME:-ifscm}
    volumes:
      - db_data:/var/lib/mysql
    ports:
      - "3307:3306"
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-p${DB_PASSWORD}"]
      interval: 10s
      timeout: 5s
      retries: 10

  backend:
    build:
      context: ./backwork
    image: backwork
    container_name: ifs-backend
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_started
    environment:
      DB_HOST: db
      DB_PORT: 3306
      DB_NAME: ${DB_NAME:-ifscm}
      DB_USER: ${DB_USER}
      DB_PASSWORD: ${DB_PASSWORD}
      JPA_DDL_AUTO: update
      SPRING_DATA_REDIS_HOST: redis
      SPRING_DATA_REDIS_PORT: 6379
      PYTHON_API_BASE_URL: http://python_api:8000
      INTERNAL_API_TOKEN: ${INTERNAL_API_TOKEN:-dev-internal-token}
      RAG_RAW_BUCKET: ${RAG_RAW_BUCKET:-mock-documents-dev}
      RAG_VECTOR_BUCKET: ${RAG_VECTOR_BUCKET:-mock-rag-dev}
      RAG_VECTOR_INDEX: ${RAG_VECTOR_INDEX:-knowledge-base}
      RAG_EMBEDDING_MODEL: ${RAG_EMBEDDING_MODEL:-text-embedding-3-small}
      RAG_PRESIGN_EXPIRY_SECONDS: ${RAG_PRESIGN_EXPIRY_SECONDS:-900}
      AWS_REGION: ${AWS_REGION:-ap-northeast-2}
    ports:
      - "8081:8080"

  python_api:
    build:
      context: ./python_api
    image: python-api
    container_name: ifs-python-api
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
      backend:
        condition: service_started
    environment:
      DB_HOST: db
      DB_PORT: 3306
      DB_NAME: ${DB_NAME:-ifscm}
      DB_USER: ${DB_USER}
      DB_PASSWORD: ${DB_PASSWORD}
      BACKEND_BASE_URL: http://backend:8080
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      OPENAI_MODEL: ${OPENAI_MODEL:-gpt-4.1-mini}
      CHAT_RETENTION_DAYS: ${CHAT_RETENTION_DAYS:-30}
      RATE_LIMIT_PER_MINUTE: ${RATE_LIMIT_PER_MINUTE:-20}
      INTERNAL_API_TOKEN: ${INTERNAL_API_TOKEN:-dev-internal-token}
      RAG_VECTOR_BUCKET: ${RAG_VECTOR_BUCKET:-mock-rag-dev}
      RAG_VECTOR_INDEX: ${RAG_VECTOR_INDEX:-knowledge-base}
      RAG_EMBEDDING_MODEL: ${RAG_EMBEDDING_MODEL:-text-embedding-3-small}
      RAG_VECTOR_BACKEND: ${RAG_VECTOR_BACKEND:-s3vectors}
      AWS_REGION: ${AWS_REGION:-ap-northeast-2}
      AWS_ACCESS_KEY_ID: ${AWS_ACCESS_KEY_ID:-}
      AWS_SECRET_ACCESS_KEY: ${AWS_SECRET_ACCESS_KEY:-}
      AWS_SESSION_TOKEN: ${AWS_SESSION_TOKEN:-}
    ports:
      - "8000:8000"

  frontend:
    build:
      context: ./reactwork
    image: reactwork
    container_name: ifs-frontend
    restart: unless-stopped
    depends_on:
      - backend
      - python_api
    ports:
      - "3000:80"

volumes:
  db_data:

